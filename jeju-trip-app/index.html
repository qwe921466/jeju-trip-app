<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <!-- PWA 與手機版優化設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="韓國愉快遊">
  <meta name="theme-color" content="#FCFAF8">
  
  <!-- 加入主畫面的 App Icon 設定 (iOS 與 Android) -->
  <link rel="apple-touch-icon" href="icons/hgk-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/hgk-192.png">

  <title>韓國愉快遊</title>
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 FontAwesome 圖標庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- 引入 React 與 Babel (用於直接在瀏覽器執行 React) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    // 暴露給全域供 React 使用
    window.firebaseAPI = { initializeApp, getFirestore, doc, setDoc, onSnapshot };
  </script>

  <style>
    /* 隱藏卷軸與動畫效果 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.9); }
      50% { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    body { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-[#FDF9F1] selection:bg-[#FFD0B5]">
  <div id="root"></div>

  <!-- 主要 React 程式碼 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ☁️ Firebase 雲端同步設定區
    // 如果您希望「集合小黑板」能在所有人手機同步，
    // 請去 https://console.firebase.google.com 免費申請一個專案，
    // 並建立 Firestore 資料庫，將 Config 貼在下方。
    // ==========================================
    const firebaseConfig = {
  apiKey: "AIzaSyBETIdPkt_PVorOzlc1_jFydMza1oU4Thw",
  authDomain: "jeju-trip-app-533e9.firebaseapp.com",
  projectId: "jeju-trip-app-533e9",
  storageBucket: "jeju-trip-app-533e9.firebasestorage.app",
  messagingSenderId: "529621055124",
  appId: "1:529621055124:web:219be39b525ebd28cce681",
  measurementId: "G-QRLBG66XC4"
};

    let db = null;
    // 等待模組載入完成後初始化 Firebase
    setTimeout(() => {
      if (firebaseConfig && window.firebaseAPI) {
        try {
          const app = window.firebaseAPI.initializeApp(firebaseConfig);
          db = window.firebaseAPI.getFirestore(app);
          console.log("Firebase 雲端同步已啟動！");
        } catch(e) {
          console.error("Firebase 啟動失敗", e);
        }
      }
    }, 500);

    // --- 圖標小幫手元件 ---
    const Icon = ({ name, className }) => <i className={`fas fa-${name} ${className || ''}`}></i>;

    // --- 初始資料設定 ---
    const INITIAL_ITINERARY = {
      1: [
        { id: '1-1', time: '02:50', title: '搭乘易斯達航空 ZE886', category: 'flight', notes: '桃園機場第1航廈6號櫃檯 (00:20集合)', hasBabyRoom: false },
        { id: '1-2', time: '08:00', title: '貝果博物館', category: 'food', notes: '充滿倫敦風情的貝果咖啡館', hasBabyRoom: false },
        { id: '1-3', time: '10:00', title: '海水溫泉汗蒸幕', category: 'attraction', notes: '含毛巾+專用衣服，洗去紅眼班機的疲憊', hasBabyRoom: false },
        { id: '1-4', time: '13:00', title: '道頭峰 (彩虹海岸道路)', category: 'attraction', notes: '俯瞰機場全貌，濟州隱藏秘景', hasBabyRoom: false },
        { id: '1-5', time: '15:00', title: 'Hugely Jeju 橘子冰淇淋', category: 'food', notes: '絕美海景與海浪投影', hasBabyRoom: false },
        { id: '1-6', time: '18:00', title: '東門傳統市場 / 夜市', category: 'shopping', notes: '晚餐發韓幣8000自理，大啖街頭美食', hasBabyRoom: false },
      ],
      2: [
        { id: '2-1', time: '09:00', title: '9.81 無重力賽車公園', category: 'attraction', notes: '體驗重力賽車與絕美海景', hasBabyRoom: true },
        { id: '2-2', time: '12:00', title: '午餐：豬肉壽喜燒吃到飽', category: 'food', notes: '', hasBabyRoom: false },
        { id: '2-3', time: '13:30', title: '騎駱駝體驗', category: 'attraction', notes: '澳洲單峰駱駝，可另外自費餵食小駱駝', hasBabyRoom: false },
        { id: '2-4', time: '15:00', title: '城山日出峰', category: 'attraction', notes: 'UNESCO 世界自然遺產，攀登約30分鐘', hasBabyRoom: false },
        { id: '2-5', time: '17:00', title: 'ECO LAND 英式森林小火車', category: 'attraction', notes: '搭乘復古小火車探訪火山口森林', hasBabyRoom: true },
        { id: '2-6', time: '19:00', title: '晚餐：鮑魚鍋巴人蔘雞', category: 'food', notes: '開城會館', hasBabyRoom: false },
      ],
      3: [
        { id: '3-1', time: '09:00', title: "O'sulloc 雪綠茶園 + innisfree 玻璃小屋", category: 'attraction', notes: '品嘗綠茶甜點，體驗濟州自然美妝', hasBabyRoom: true },
        { id: '3-2', time: '13:00', title: '羊駝樂園', category: 'attraction', notes: '每人一桶飼料，小心羊駝吐口水！', hasBabyRoom: false },
        { id: '3-3', time: '15:00', title: 'HARIBO 小熊軟糖快樂世界', category: 'attraction', notes: '10種主題區，尋找童心', hasBabyRoom: true },
        { id: '3-4', time: '17:00', title: '濟州 AQUA PLANET 水族館', category: 'attraction', notes: '亞洲最大海洋世界', hasBabyRoom: true },
        { id: '3-5', time: '19:00', title: '晚餐：韓國烤肉無限放題', category: 'food', notes: '豬牛烤肉+炒年糕+燉雞', hasBabyRoom: false },
      ],
      4: [
        { id: '4-1', time: '09:00', title: '韓系彩粧名品店', category: 'shopping', notes: '贈送每人精美小禮物一份', hasBabyRoom: false },
        { id: '4-2', time: '11:00', title: '梨湖紅白馬小燈塔', category: 'attraction', notes: '超吸睛紅白小馬造型燈塔，適合拍照', hasBabyRoom: false },
        { id: '4-3', time: '13:00', title: '漢潭海岸散步路', category: 'attraction', notes: '涯月海岸咖啡街，孝利家民宿拍攝地', hasBabyRoom: false },
        { id: '4-4', time: '15:00', title: '入住 神話世界 萬豪酒店', category: 'other', notes: '享受飯店室內外泳池與設施', hasBabyRoom: true },
        { id: '4-5', time: '18:00', title: '晚餐：神話世界【五雲閣】自助餐廳', category: 'food', notes: '酒水無限暢飲，頂級美饌', hasBabyRoom: true },
      ],
      5: [
        { id: '5-1', time: '09:00', title: '神話世界全日自由活動', category: 'attraction', notes: '贈主題樂園門票+韓服變裝體驗4小時', hasBabyRoom: true },
        { id: '5-2', time: '14:00', title: 'E-MART 超市', category: 'shopping', notes: '採買伴手禮好去處', hasBabyRoom: true },
        { id: '5-3', time: '16:00', title: '蓮洞購物商圈', category: 'shopping', notes: '時尚購物街，晚餐發韓幣8000自理', hasBabyRoom: false },
        { id: '5-4', time: '22:40', title: '搭乘易斯達航空 ZE885', category: 'flight', notes: '準備返回溫暖的家', hasBabyRoom: true },
      ]
    };

    const KOREAN_PHRASES = [
      { id: 1, tw: '請不要加辣，一點點辣也不要', kr: '전혀 맵지 않게 해 주세요.', pron: 'Jeon-hyeo maep-ji an-ke hae ju-se-yo.' },
      { id: 2, tw: '請問有兒童座椅嗎？', kr: '아기 의자 있나요?', pron: 'A-gi ui-ja in-na-yo?' },
      { id: 3, tw: '請給我一點熱水 (泡奶用)', kr: '뜨거운 물 좀 주시겠어요?', pron: 'Tteu-geo-un mul jom ju-si-ge-sseo-yo?' },
      { id: 4, tw: '請問洗手間在哪裡？', kr: '화장실이 어디예요?', pron: 'Hwa-jang-sil-i eo-di-ye-yo?' },
      { id: 5, tw: '結帳請分開算 (各付各的)', kr: '따로따로 계산해 주세요.', pron: 'Tta-ro-tta-ro gye-san-hae ju-se-yo.' }
    ];

    const WEATHER_MOCK = {
      1: { date: '04/15 (三)', temp: '16-21°C', icon: 'sun', color: 'text-orange-500' },
      2: { date: '04/16 (四)', temp: '15-19°C', icon: 'cloud', color: 'text-stone-400' },
      3: { date: '04/17 (五)', temp: '14-18°C', icon: 'cloud-showers-heavy', color: 'text-blue-400' },
      4: { date: '04/18 (六)', temp: '16-22°C', icon: 'sun', color: 'text-orange-500' },
      5: { date: '04/19 (日)', temp: '17-23°C', icon: 'sun', color: 'text-orange-500' },
    };

    const CATEGORY_OPTIONS = [
      { value: 'attraction', label: '景點', icon: 'map-marker-alt' },
      { value: 'transport', label: '交通', icon: 'car' },
      { value: 'flight', label: '航班', icon: 'plane' },
      { value: 'food', label: '美食', icon: 'utensils' },
      { value: 'shopping', label: '購物', icon: 'shopping-bag' },
      { value: 'other', label: '其他', icon: 'star' },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('itinerary'); 
      const [activeDay, setActiveDay] = useState(1);
      const [itinerary, setItinerary] = useState(INITIAL_ITINERARY);
      
      // 彩蛋 1：加入假掰的預設待辦事項
      const [todos, setTodos] = useState([
        { id: 999, text: '先打勾再說', completed: false, type: 'task' },
        { id: 1, text: '確認護照效期（六個月以上）', completed: true, type: 'task' },
        { id: 2, text: '台塑有漲', completed: false, type: 'task' },
        { id: 3, text: '橘子巧克力', completed: false, type: 'shopping' },
        { id: 4, text: 'Innisfree 綠茶精華', completed: false, type: 'shopping' }
      ]);
      const [expenses, setExpenses] = useState([]);
      
      const exchangeRate = 0.024; 

      const [convKRW, setConvKRW] = useState('');
      const [convTWD, setConvTWD] = useState('');

      const handleConvKRWChange = (val) => {
        setConvKRW(val);
        if (val === '') { setConvTWD(''); return; }
        setConvTWD(Math.round(Number(val) * exchangeRate).toString());
      };

      const handleConvTWDChange = (val) => {
        setConvTWD(val);
        if (val === '') { setConvKRW(''); return; }
        setConvKRW(Math.round(Number(val) / exchangeRate).toString());
      };

      const mainRef = useRef(null);

      useEffect(() => {
        if (mainRef.current && activeTab === 'itinerary') {
          mainRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }, [activeDay, activeTab]);

      const [editingTodoId, setEditingTodoId] = useState(null);
      const [editingTodoText, setEditingTodoText] = useState('');

      const deleteTodo = (id) => setTodos(todos.filter(t => t.id !== id));
      const startEditingTodo = (todo) => {
        setEditingTodoId(todo.id);
        setEditingTodoText(todo.text);
      };
      const saveTodo = (id) => {
        if (editingTodoText.trim()) {
          setTodos(todos.map(t => t.id === id ? { ...t, text: editingTodoText } : t));
        }
        setEditingTodoId(null);
      };

      // --- 彩蛋 2：密技點擊計數器 ---
      const [secretTap, setSecretTap] = useState(0);
      const [showEgg3, setShowEgg3] = useState(false);
      const [showEgg5, setShowEgg5] = useState(false);

      const handleHeaderTap = () => {
        const newCount = secretTap + 1;
        if (newCount === 3) {
          setShowEgg3(true);
          setSecretTap(newCount); // 保留計數，讓他們關掉後可以繼續點到 5
        } else if (newCount >= 5) {
          setShowEgg5(true);
          setSecretTap(0); // 歸零重置
        } else {
          setSecretTap(newCount);
        }
      };

      // --- 同步集合板邏輯 ---
      const [isSyncing, setIsSyncing] = useState(false);
      const [meetup, setMeetup] = useState({ time: '18:00', location: '東門市場3號出口', note: '買完晚餐請準時上車喔！' });
      const [isEditingMeetup, setIsEditingMeetup] = useState(false);

      useEffect(() => {
        const checkDb = setInterval(() => {
          if (db && window.firebaseAPI) {
            setIsSyncing(true);
            const meetupRef = window.firebaseAPI.doc(db, 'public', 'meetupBoard');
            window.firebaseAPI.onSnapshot(meetupRef, (docSnap) => {
              if (docSnap.exists()) {
                setMeetup(docSnap.data());
              }
            });
            clearInterval(checkDb);
          }
        }, 1000);
        return () => clearInterval(checkDb);
      }, []);

      const saveCloudMeetup = async () => {
        setIsEditingMeetup(false);
        if (db && window.firebaseAPI) {
          try {
            const meetupRef = window.firebaseAPI.doc(db, 'public', 'meetupBoard');
            await window.firebaseAPI.setDoc(meetupRef, meetup);
          } catch (e) {
            console.error("Save error", e);
          }
        }
      };

      // --- 韓國退稅小幫手 ---
      const [taxInput, setTaxInput] = useState('');
      const getTaxRefundStatus = (val) => {
        if (!val) return null;
        const amt = Number(val);
        if (amt < 15000) {
          return { 
            title: '還差一點點！', 
            desc: `再湊 ${(15000 - amt).toLocaleString()} 韓元就可以退稅囉！`,
            color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-200'
          };
        } else if (amt >= 15000 && amt < 1000000) {
          return { 
            title: '✅ 可享現場退稅 / 機場退稅', 
            desc: `預估可退約 ${(Math.floor(amt * 0.06)).toLocaleString()} 韓元 (約 6%)`,
            color: 'text-[#00796B]', bg: 'bg-[#E0F2F1]', border: 'border-[#B2DFDB]'
          };
        } else {
          return { 
            title: '✅ 達退稅門檻！(需至機場退稅)', 
            desc: `單筆超過 100 萬韓元，請記得向店員索取退稅單至機場辦理。`,
            color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-200'
          };
        }
      };

      const [isEventModalOpen, setIsEventModalOpen] = useState(false);
      const [editingEvent, setEditingEvent] = useState(null);
      
      const getCategoryColor = (cat) => {
        switch(cat) {
          case 'attraction': return 'bg-[#FFF3E0] text-[#E65100] border border-[#FFE0B2]';
          case 'food': return 'bg-[#FCE4EC] text-[#C2185B] border border-[#F8BBD0]';
          case 'shopping': return 'bg-[#F3E5F5] text-[#7B1FA2] border border-[#E1BEE7]';
          case 'flight': return 'bg-[#E8EEF2] text-[#455A64] border border-[#CFD8DC]';
          case 'transport': return 'bg-[#E0F2F1] text-[#00796B] border border-[#B2DFDB]';
          default: return 'bg-stone-50 text-stone-600 border border-stone-200';
        }
      };

      return (
        <div className="min-h-screen bg-[#FDF9F1] flex justify-center font-sans text-[#4A3F35]">
          <div className="w-full max-w-md bg-[#FCFAF8] relative shadow-2xl flex flex-col h-screen overflow-hidden">
            
            {/* Header */}
            <header className="px-6 pt-12 pb-4 bg-[#FCFAF8] sticky top-0 z-10 flex flex-col gap-5 border-b border-[#F0EAE1]">
              <div className="flex justify-between items-end">
                <div>
                  <p className="text-[#FF7E67] font-bold text-xs tracking-widest mb-1 uppercase">Jeju Island</p>
                  {/* 在大標題綁定彩蛋點擊事件 */}
                  <h1 
                    onClick={handleHeaderTap}
                    className="text-2xl font-extrabold tracking-tight text-[#3E332A] cursor-pointer select-none"
                  >
                    濟州島旅行計畫
                  </h1>
                </div>
                <span className="text-[11px] font-bold px-3 py-1.5 bg-[#FFF0E5] text-[#D85A42] border border-[#FFD0B5] rounded-lg">
                  寶馬假期 5日
                </span>
              </div>

              {activeTab === 'itinerary' && (
                <div className="flex space-x-3 overflow-x-auto pb-2 scrollbar-hide">
                  {[1, 2, 3, 4, 5].map((day) => (
                    <button
                      key={day}
                      onClick={() => setActiveDay(day)}
                      className={`flex-shrink-0 flex flex-col items-center justify-center w-16 h-[72px] rounded-[20px] transition-all duration-300 ${
                        activeDay === day 
                          ? 'bg-gradient-to-br from-[#FF7E67] to-[#FFA94D] text-white shadow-[0_8px_16px_rgba(255,126,103,0.3)] font-bold scale-105 border-none' 
                          : 'bg-white text-stone-400 border border-[#EFE8DF] hover:bg-[#FFF8F3]'
                      }`}
                    >
                      <span className={`text-[10px] mb-1 font-semibold ${activeDay === day ? 'text-white/80' : 'text-stone-400'}`}>DAY</span>
                      <span className="text-2xl leading-none font-extrabold">{day}</span>
                    </button>
                  ))}
                </div>
              )}
            </header>

            {/* 主要內容區塊 */}
            <main ref={mainRef} className="flex-1 overflow-y-auto px-6 py-6 pb-28 scroll-smooth bg-[#FDF9F1]">
              
              {/* === 行程表 === */}
              {activeTab === 'itinerary' && (
                <div className="animate-fade-in">
                  <div className="flex items-center justify-between bg-gradient-to-r from-[#FFF4E6] to-[#FFEBE0] px-5 py-4 rounded-2xl border border-[#FFD0B5] mb-8">
                    <div>
                      <div className="text-xs text-[#D85A42] font-extrabold mb-1">{WEATHER_MOCK[activeDay].date}</div>
                      <div className="text-base font-extrabold text-[#4A3F35] flex items-center gap-1.5">
                        <Icon name="map-marker-alt" className="text-[#FF7E67]" /> 濟州市
                      </div>
                    </div>
                    <div className="flex flex-col items-end">
                      <Icon name={WEATHER_MOCK[activeDay].icon} className={`text-xl ${WEATHER_MOCK[activeDay].color}`} />
                      <span className="text-[15px] font-extrabold text-[#4A3F35] mt-1">{WEATHER_MOCK[activeDay].temp}</span>
                    </div>
                  </div>

                  <div className="relative border-l-[3px] border-[#FFD0B5] ml-3 pl-6 space-y-6">
                    {itinerary[activeDay].map((item) => {
                      const catInfo = CATEGORY_OPTIONS.find(o => o.value === item.category);
                      return (
                        <div key={item.id} className="relative">
                          <div className="absolute -left-[32px] top-1.5 w-4 h-4 bg-[#FF7E67] rounded-full border-[3px] border-[#FDF9F1]"></div>
                          <div 
                            onClick={() => { setEditingEvent({ day: activeDay, ...item }); setIsEventModalOpen(true); }}
                            className="bg-white p-5 rounded-2xl border border-[#F0EAE1] hover:border-[#FFD0B5] cursor-pointer"
                          >
                            <div className="flex justify-between items-start mb-3">
                              <span className="font-extrabold text-[#FF7E67] text-xl tracking-tight">{item.time}</span>
                              <div className={`px-2.5 py-1 rounded-md text-[11px] font-bold flex items-center gap-1.5 ${getCategoryColor(item.category)}`}>
                                <Icon name={catInfo ? catInfo.icon : 'star'} />
                                <span>{catInfo ? catInfo.label : '其他'}</span>
                              </div>
                            </div>
                            <h3 className="text-[#3E332A] font-bold text-[17px] mb-1">{item.title}</h3>
                            {item.notes && <p className="text-sm text-[#8A7D71] font-medium">{item.notes}</p>}
                            {item.category === 'attraction' && item.hasBabyRoom && (
                              <div className="flex items-center gap-1.5 text-xs text-[#00796B] bg-[#E0F2F1] border border-[#B2DFDB] inline-flex px-2.5 py-1 rounded-md mt-3 font-bold">
                                <Icon name="baby" /> 設有育嬰室
                              </div>
                            )}
                          </div>
                        </div>
                      )
                    })}
                    <button 
                      onClick={() => { 
                        setEditingEvent({ day: activeDay, id: Date.now().toString(), time: '12:00', title: '', category: 'attraction', notes: '', hasBabyRoom: false, isNew: true }); 
                        setIsEventModalOpen(true); 
                      }}
                      className="w-full py-4 bg-[#FFF8F3] border border-dashed border-[#FFD0B5] text-[#FF7E67] rounded-2xl flex justify-center items-center gap-2 font-bold mt-4"
                    >
                      <Icon name="plus" /> 新增行程
                    </button>
                  </div>
                </div>
              )}

              {/* === 待辦事項 === */}
              {activeTab === 'todo' && (
                <div className="animate-fade-in space-y-8">
                  <section>
                    <h2 className="text-base font-extrabold text-[#3E332A] mb-4 flex items-center gap-2">
                      <Icon name="check-square" className="text-[#FF7E67]" /> 行前準備 TO-DO
                    </h2>
                    <div className="bg-white rounded-2xl p-5 border border-[#F0EAE1] space-y-4">
                      {todos.filter(t => t.type === 'task').map(todo => (
                        <div key={todo.id} className="flex items-center justify-between gap-3">
                          <label className="flex items-center gap-3 cursor-pointer flex-1">
                            <input 
                              type="checkbox" 
                              checked={todo.completed}
                              onChange={() => setTodos(todos.map(t => t.id === todo.id ? { ...t, completed: !t.completed } : t))}
                              className="w-5 h-5 accent-[#FF7E67] rounded-md"
                            />
                            {editingTodoId === todo.id ? (
                              <input
                                type="text"
                                value={editingTodoText}
                                onChange={(e) => setEditingTodoText(e.target.value)}
                                onBlur={() => saveTodo(todo.id)}
                                onKeyDown={(e) => e.key === 'Enter' && saveTodo(todo.id)}
                                autoFocus
                                className="flex-1 bg-[#FDF9F1] border border-[#FFD0B5] rounded px-2 py-1 text-sm outline-none"
                              />
                            ) : (
                              <span className={`text-[#5C4F44] font-medium ${todo.completed ? 'line-through text-[#B5A99C]' : ''}`}>
                                {todo.text}
                              </span>
                            )}
                          </label>
                          {editingTodoId !== todo.id && (
                            <div className="flex gap-2">
                              <button onClick={() => startEditingTodo(todo)} className="text-[#B5A99C]"><Icon name="pen" /></button>
                              <button onClick={() => deleteTodo(todo.id)} className="text-[#B5A99C]"><Icon name="trash" /></button>
                            </div>
                          )}
                        </div>
                      ))}
                      <div className="pt-3 mt-3 border-t border-[#F0EAE1]">
                        <input type="text" placeholder="+ 新增待辦事項..." className="w-full text-sm outline-none bg-transparent" onKeyDown={(e) => {
                          if(e.key === 'Enter' && e.target.value.trim()){
                            setTodos([...todos, { id: Date.now(), text: e.target.value, completed: false, type: 'task' }]);
                            e.target.value = '';
                          }
                        }}/>
                      </div>
                    </div>
                  </section>
                  <section>
                    <h2 className="text-base font-extrabold text-[#3E332A] mb-4 flex items-center gap-2">
                      <Icon name="shopping-bag" className="text-[#FFA94D]" /> 待買購物清單
                    </h2>
                    <div className="bg-white rounded-2xl p-5 border border-[#F0EAE1] space-y-4">
                      {todos.filter(t => t.type === 'shopping').map(todo => (
                        <div key={todo.id} className="flex items-center justify-between gap-3">
                          <label className="flex items-center gap-3 cursor-pointer flex-1">
                            <input 
                              type="checkbox" 
                              checked={todo.completed}
                              onChange={() => setTodos(todos.map(t => t.id === todo.id ? { ...t, completed: !t.completed } : t))}
                              className="w-5 h-5 accent-[#FFA94D] rounded-md"
                            />
                            {editingTodoId === todo.id ? (
                              <input
                                type="text"
                                value={editingTodoText}
                                onChange={(e) => setEditingTodoText(e.target.value)}
                                onBlur={() => saveTodo(todo.id)}
                                onKeyDown={(e) => e.key === 'Enter' && saveTodo(todo.id)}
                                autoFocus
                                className="flex-1 bg-[#FDF9F1] border border-[#FFD0B5] rounded px-2 py-1 text-sm outline-none"
                              />
                            ) : (
                              <span className={`text-[#5C4F44] font-medium ${todo.completed ? 'line-through text-[#B5A99C]' : ''}`}>
                                {todo.text}
                              </span>
                            )}
                          </label>
                          {editingTodoId !== todo.id && (
                            <div className="flex gap-2">
                              <button onClick={() => startEditingTodo(todo)} className="text-[#B5A99C]"><Icon name="pen" /></button>
                              <button onClick={() => deleteTodo(todo.id)} className="text-[#B5A99C]"><Icon name="trash" /></button>
                            </div>
                          )}
                        </div>
                      ))}
                      <div className="pt-3 mt-3 border-t border-[#F0EAE1]">
                        <input type="text" placeholder="+ 新增待買物品..." className="w-full text-sm outline-none bg-transparent" onKeyDown={(e) => {
                          if(e.key === 'Enter' && e.target.value.trim()){
                            setTodos([...todos, { id: Date.now(), text: e.target.value, completed: false, type: 'shopping' }]);
                            e.target.value = '';
                          }
                        }}/>
                      </div>
                    </div>
                  </section>
                </div>
              )}

              {/* === 記帳系統 === */}
              {activeTab === 'accounting' && (
                <div className="animate-fade-in space-y-6">
                  <div className="bg-white rounded-2xl p-5 border border-[#F0EAE1]">
                    <h3 className="font-extrabold text-[#3E332A] mb-4 flex items-center gap-2">
                      <Icon name="calculator" className="text-[#FF7E67]" /> 💱 即時匯率換算
                    </h3>
                    <div className="flex items-center gap-3">
                      <div className="flex-1 relative">
                        <span className="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-[#B5A99C]">₩</span>
                        <input type="number" value={convKRW} onChange={(e) => handleConvKRWChange(e.target.value)} placeholder="韓元" className="w-full bg-[#FDF9F1] border border-[#EAE0D5] rounded-xl py-3 pl-8 pr-3 outline-none" />
                      </div>
                      <Icon name="exchange-alt" className="text-[#D8CFC4]" />
                      <div className="flex-1 relative">
                        <span className="absolute left-3 top-1/2 -translate-y-1/2 font-bold text-[#B5A99C]">NT$</span>
                        <input type="number" value={convTWD} onChange={(e) => handleConvTWDChange(e.target.value)} placeholder="台幣" className="w-full bg-[#FDF9F1] border border-[#EAE0D5] rounded-xl py-3 pl-11 pr-3 outline-none" />
                      </div>
                    </div>
                  </div>

                  <div className="bg-gradient-to-br from-[#FF7E67] to-[#FFA94D] p-7 rounded-[24px] text-white">
                    <h2 className="text-sm font-bold mb-2">個人花費小計 (已換算)</h2>
                    <div className="text-[40px] font-extrabold">NT$ {Math.round(expenses.reduce((acc, curr) => acc + curr.twd, 0)).toLocaleString()}</div>
                    <div className="text-sm mt-3 bg-white/20 inline-block px-3 py-1 rounded-lg">₩ {expenses.reduce((acc, curr) => acc + curr.krw, 0).toLocaleString()} 韓元</div>
                  </div>

                  <div className="bg-white rounded-2xl p-6 border border-[#F0EAE1]">
                    <h3 className="font-extrabold mb-4">新增一筆花費</h3>
                    <form onSubmit={(e) => {
                      e.preventDefault();
                      const fd = new FormData(e.target);
                      const title = fd.get('title'), krw = Number(fd.get('krw'));
                      if(title && krw) { setExpenses([{ id: Date.now(), title, krw, twd: krw * exchangeRate, date: new Date().toLocaleDateString() }, ...expenses]); e.target.reset(); }
                    }} className="space-y-4">
                      <input required name="title" type="text" placeholder="品項名稱" className="w-full bg-[#FDF9F1] border border-[#EAE0D5] rounded-xl p-4 outline-none" />
                      <input required name="krw" type="number" placeholder="₩ 輸入韓幣金額" className="w-full bg-[#FDF9F1] border border-[#EAE0D5] rounded-xl p-4 outline-none" />
                      <button type="submit" className="w-full bg-[#3E332A] text-white rounded-xl py-4 font-bold">記一筆</button>
                    </form>
                  </div>

                  <div className="space-y-3 pb-4">
                    <h3 className="font-extrabold ml-1">歷史紀錄</h3>
                    {expenses.map(exp => (
                      <div key={exp.id} className="flex justify-between items-center bg-white p-5 rounded-2xl border border-[#F0EAE1]">
                        <div><div className="font-extrabold">{exp.title}</div><div className="text-[11px] text-[#B5A99C]">{exp.date}</div></div>
                        <div className="text-right"><div className="font-extrabold text-[#FF7E67]">₩ {exp.krw.toLocaleString()}</div><div className="text-xs text-[#B5A99C]">≈ NT$ {Math.round(exp.twd).toLocaleString()}</div></div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* === 實用工具 === */}
              {activeTab === 'guide' && (
                <div className="animate-fade-in space-y-8">
                  <section>
                    <div className="flex items-center justify-between mb-4">
                      <h2 className="font-extrabold flex items-center gap-2"><Icon name="clock" className="text-[#FF7E67]"/> 下次集合資訊</h2>
                      <div className="text-[10px] font-bold text-[#00796B] bg-[#E0F2F1] px-2 py-1 rounded border border-[#B2DFDB]">
                        {isSyncing ? "雲端即時同步中" : (firebaseConfig ? "連線準備中" : "單機模式(未填入金鑰)")}
                      </div>
                    </div>
                    <div className="bg-gradient-to-br from-[#FFF4E6] to-[#FFEBE0] rounded-2xl p-6 border border-[#FFD0B5] relative">
                      {!isEditingMeetup ? (
                        <>
                          <button onClick={() => setIsEditingMeetup(true)} className="absolute top-4 right-4 text-[#FF7E67]"><Icon name="pen" /></button>
                          <div className="text-center space-y-2">
                            <div className="text-[#D85A42] font-black text-[42px]">{meetup.time}</div>
                            <div className="font-extrabold text-lg"><Icon name="map-marker-alt" className="text-[#FF7E67]"/> {meetup.location}</div>
                            {meetup.note && <div className="text-sm text-[#8A7D71] mt-3 bg-white/40 inline-block px-3 py-1 rounded-lg">{meetup.note}</div>}
                          </div>
                        </>
                      ) : (
                        <div className="space-y-3">
                          <input type="time" value={meetup.time} onChange={e => setMeetup({...meetup, time: e.target.value})} className="w-full bg-white border border-[#FFD0B5] rounded-xl p-3 font-black text-xl text-center" />
                          <input type="text" placeholder="集合地點" value={meetup.location} onChange={e => setMeetup({...meetup, location: e.target.value})} className="w-full bg-white border border-[#FFD0B5] rounded-xl p-3 font-bold text-center" />
                          <input type="text" placeholder="備註" value={meetup.note} onChange={e => setMeetup({...meetup, note: e.target.value})} className="w-full bg-white border border-[#FFD0B5] rounded-xl p-3 text-sm text-center" />
                          <button onClick={saveCloudMeetup} className="w-full bg-[#FF7E67] text-white font-bold py-3 rounded-xl">儲存並同步</button>
                        </div>
                      )}
                    </div>
                  </section>

                  <section>
                    <h2 className="font-extrabold mb-4 flex items-center gap-2"><Icon name="receipt" className="text-[#FFA94D]"/> 韓國退稅計算機</h2>
                    <div className="bg-white rounded-2xl p-5 border border-[#F0EAE1]">
                      <p className="text-xs bg-[#FDF9F1] p-3 rounded-xl mb-4">單筆只要滿 <strong>15,000 韓元</strong> 即可退稅！</p>
                      <input type="number" value={taxInput} onChange={(e) => setTaxInput(e.target.value)} placeholder="₩ 輸入總金額" className="w-full bg-[#FDF9F1] border border-[#EAE0D5] rounded-xl p-4 font-bold mb-4" />
                      {taxInput && getTaxRefundStatus(taxInput) && (() => {
                        const s = getTaxRefundStatus(taxInput);
                        return <div className={`p-4 rounded-xl border ${s.bg} ${s.border}`}><div className={`font-extrabold ${s.color}`}>{s.title}</div><div className={`text-xs mt-1 ${s.color}`}>{s.desc}</div></div>
                      })()}
                    </div>
                  </section>

                  <section>
                    <h2 className="font-extrabold mb-4 flex items-center gap-2"><Icon name="comment-dots" className="text-[#00796B]"/> 實用點餐字卡</h2>
                    <div className="space-y-4">
                      {KOREAN_PHRASES.map((phrase) => (
                        <div key={phrase.id} className="bg-white rounded-2xl p-5 border border-[#F0EAE1] relative overflow-hidden">
                          <div className="absolute left-0 top-0 w-1.5 h-full bg-[#00796B]"></div>
                          <div className="font-extrabold text-sm mb-3">{phrase.tw}</div>
                          <div className="bg-[#FDF9F1] p-4 rounded-xl"><div className="text-xl font-black text-[#00695C] mb-2">{phrase.kr}</div><div className="text-xs text-[#B5A99C]">{phrase.pron}</div></div>
                        </div>
                      ))}
                    </div>
                  </section>
                </div>
              )}

              {/* === 資訊站 === */}
              {activeTab === 'info' && (
                <div className="animate-fade-in space-y-5">
                  <section className="bg-white rounded-2xl p-6 border border-[#F0EAE1]">
                    <h2 className="font-extrabold mb-4 flex items-center gap-2"><Icon name="exclamation-circle" className="text-[#E65100]"/> 緊急聯絡資訊</h2>
                    <div className="space-y-3 text-sm">
                      <div className="flex justify-between pb-3 border-b"><span className="text-[#8A7D71]">韓國聯絡人</span><span className="font-extrabold">楊常務 002-82-10-5383-9682</span></div>
                      <div className="flex justify-between pb-3 border-b"><span className="text-[#8A7D71]">台灣聯絡人</span><span className="font-extrabold">葉小姐 0935-183-151</span></div>
                      <div className="flex justify-between"><span className="text-[#8A7D71]">台灣領隊</span><span className="font-extrabold">簡秋暖 0922-098-039</span></div>
                    </div>
                  </section>
                </div>
              )}
            </main>

            {/* Navbar */}
            <nav className="bg-white/95 border-t border-[#F0EAE1] px-4 py-3 pb-7 flex justify-between absolute bottom-0 w-full z-10">
              <button onClick={() => setActiveTab('itinerary')} className={`flex flex-col items-center w-1/5 ${activeTab==='itinerary' ? 'text-[#FF7E67]' : 'text-[#B5A99C]'}`}><Icon name="calendar-alt" className="text-xl"/><span className="text-[10px] mt-1 font-bold">行程</span></button>
              <button onClick={() => setActiveTab('todo')} className={`flex flex-col items-center w-1/5 ${activeTab==='todo' ? 'text-[#FF7E67]' : 'text-[#B5A99C]'}`}><Icon name="check-square" className="text-xl"/><span className="text-[10px] mt-1 font-bold">清單</span></button>
              <button onClick={() => setActiveTab('accounting')} className={`flex flex-col items-center w-1/5 ${activeTab==='accounting' ? 'text-[#FF7E67]' : 'text-[#B5A99C]'}`}><Icon name="wallet" className="text-xl"/><span className="text-[10px] mt-1 font-bold">記帳</span></button>
              <button onClick={() => setActiveTab('guide')} className={`flex flex-col items-center w-1/5 ${activeTab==='guide' ? 'text-[#FF7E67]' : 'text-[#B5A99C]'}`}><Icon name="compass" className="text-xl"/><span className="text-[10px] mt-1 font-bold">實用</span></button>
              <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center w-1/5 ${activeTab==='info' ? 'text-[#FF7E67]' : 'text-[#B5A99C]'}`}><Icon name="info-circle" className="text-xl"/><span className="text-[10px] mt-1 font-bold">資訊</span></button>
            </nav>

            {/* Modal: 新增/編輯行程 */}
            {isEventModalOpen && editingEvent && (
              <div className="absolute inset-0 z-50 bg-[#3E332A]/40 flex items-end animate-fade-in">
                <div className="bg-white w-full h-[85vh] rounded-t-[32px] p-7 flex flex-col">
                  <div className="flex justify-between mb-6"><h2 className="text-xl font-extrabold">{editingEvent.isNew ? '新增' : '編輯'}</h2><button onClick={() => setIsEventModalOpen(false)}><Icon name="times" className="text-xl text-[#B5A99C]"/></button></div>
                  <div className="flex-1 overflow-y-auto space-y-6 pb-24 scrollbar-hide">
                    <div><label className="block text-xs font-bold mb-2">TIME</label><input type="time" value={editingEvent.time} onChange={e => setEditingEvent({...editingEvent, time: e.target.value})} className="w-full bg-[#FDF9F1] border rounded-xl p-4 font-extrabold outline-none" /></div>
                    <div><label className="block text-xs font-bold mb-2">TITLE</label><input type="text" value={editingEvent.title} onChange={e => setEditingEvent({...editingEvent, title: e.target.value})} className="w-full bg-[#FDF9F1] border rounded-xl p-4 font-extrabold outline-none" /></div>
                    <div><label className="block text-xs font-bold mb-2">NOTES</label><textarea value={editingEvent.notes} onChange={e => setEditingEvent({...editingEvent, notes: e.target.value})} className="w-full bg-[#FDF9F1] border rounded-xl p-4 font-medium outline-none" /></div>
                  </div>
                  <div className="absolute bottom-0 w-full left-0 p-6 bg-white border-t flex gap-3">
                    {!editingEvent.isNew && <button onClick={() => { setItinerary({...itinerary, [editingEvent.day]: itinerary[editingEvent.day].filter(e => e.id !== editingEvent.id)}); setIsEventModalOpen(false); }} className="w-14 h-14 bg-[#FCE4EC] text-[#C2185B] rounded-2xl"><Icon name="trash" /></button>}
                    <button onClick={() => { 
                      let updatedDay;
                      if(editingEvent.isNew) updatedDay = [...itinerary[editingEvent.day], editingEvent].sort((a,b)=>a.time.localeCompare(b.time));
                      else updatedDay = itinerary[editingEvent.day].map(e => e.id === editingEvent.id ? editingEvent : e).sort((a,b)=>a.time.localeCompare(b.time));
                      setItinerary({...itinerary, [editingEvent.day]: updatedDay}); setIsEventModalOpen(false);
                    }} className="flex-1 bg-[#3E332A] text-white rounded-2xl font-bold">儲存</button>
                  </div>
                </div>
              </div>
            )}

            {/* Modal: 開發者防偽彩蛋 (點擊 3 下) */}
            {showEgg3 && (
              <div className="absolute inset-0 z-50 bg-[#3E332A]/60 backdrop-blur-sm flex items-center justify-center animate-fade-in p-6">
                <div className="bg-white w-full rounded-[32px] p-8 shadow-2xl flex flex-col items-center text-center relative overflow-hidden animate-pop-in">
                  <div className="absolute -top-10 -right-10 w-32 h-32 bg-[#FFF0E5] rounded-full blur-2xl"></div>
                  <div className="absolute -bottom-10 -left-10 w-32 h-32 bg-[#E0F2F1] rounded-full blur-2xl"></div>
                  
                  <div className="relative z-10 w-full">
                    <div className="text-5xl mb-4 animate-bounce text-center">👀</div>
                    <h2 className="text-2xl font-black text-[#D85A42] mb-2 text-center">你居然會點三下</h2>
                    <div className="w-12 h-1 bg-[#FFD0B5] mx-auto mb-5 rounded-full"></div>
                    <div className="text-[#5C4F44] font-bold leading-relaxed mb-6 text-left inline-block">
                      既然都點到這了，<br/>那順便提醒一下：<br/><br/>
                      <span className="text-[#FF7E67] font-black text-lg">👉 行程是真的有人會看的</span>
                    </div>
                    <button 
                      onClick={() => setShowEgg3(false)}
                      className="w-full bg-gradient-to-r from-[#FF7E67] to-[#FFA94D] text-white font-black py-3.5 rounded-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all"
                    >
                      收到！
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Modal: 堯哥開發者聲明 (點擊 5 下) */}
            {showEgg5 && (
              <div className="absolute inset-0 z-50 bg-[#3E332A]/60 backdrop-blur-sm flex items-center justify-center animate-fade-in p-6">
                <div className="bg-white w-full rounded-[32px] p-8 shadow-2xl flex flex-col items-center text-center relative overflow-hidden animate-pop-in">
                  <div className="absolute -top-10 -right-10 w-32 h-32 bg-[#FFF0E5] rounded-full blur-2xl"></div>
                  <div className="absolute -bottom-10 -left-10 w-32 h-32 bg-[#E0F2F1] rounded-full blur-2xl"></div>
                  
                  <div className="relative z-10 w-full">
                    <div className="text-5xl mb-4 animate-bounce text-center">👨‍💻</div>
                    <h2 className="text-2xl font-black text-[#D85A42] mb-2 text-center">堯哥開發者聲明</h2>
                    <div className="w-12 h-1 bg-[#FFD0B5] mx-auto mb-5 rounded-full"></div>
                    <div className="text-[#5C4F44] font-bold leading-relaxed mb-6 text-left inline-block">
                      這個 App 是堯哥親手打造的，<br/>
                      不是下載來的，是用肝換來的。<br/><br/>
                      本系統主要功能如下：<br/>
                      <span className="text-[#FF7E67] mr-1">✔</span>幫你記行程<br/>
                      <span className="text-[#FF7E67] mr-1">✔</span>幫你記時間<br/>
                      <span className="text-[#FF7E67] mr-1">✔</span>幫你記你自己記不起來的事<br/><br/>
                      如果你還是迷路、遲到、搞不清楚狀況：<br/>
                      <span className="text-[#FF7E67] font-black text-[15px]">👉 那就不是 App 的問題了 😎</span>
                    </div>
                    <button 
                      onClick={() => setShowEgg5(false)}
                      className="w-full bg-gradient-to-r from-[#FF7E67] to-[#FFA94D] text-white font-black py-3.5 rounded-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all"
                    >
                      膜拜堯哥！🙌
                    </button>
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
